services:
  - type: web
    name: igloo-chat
    runtime: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
        description: "Optional: Your Google Gemini API Key. If omitted, the application will automatically fall back to the pre-configured credential key."
